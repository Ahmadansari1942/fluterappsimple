name: fluterappsimple
description: Ahmad Blog - Article sharing app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  flutter_dotenv: ^5.1.0
  provider: ^6.0.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  google_fonts: ^4.0.0
  shared_preferences: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/.env
    - assets/images/
    - assets/icons/
